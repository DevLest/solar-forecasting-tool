<div id="confirmation-modal" role="dialog" aria-modal="true" aria-labelledby="confirmation-modal-title">
  <div class="modal-panel p-6">
    <h2 id="confirmation-modal-title" class="text-sm font-bold uppercase tracking-wider text-brand-muted mb-3"></h2>
    <div id="confirmation-modal-body" class="text-sm text-brand-text mb-6 whitespace-pre-wrap"></div>
    <div class="flex justify-end gap-3">
      <button type="button" id="confirmation-modal-cancel" class="px-4 py-2 rounded-lg border border-brand-border text-brand-muted hover:bg-brand-border/20 text-sm font-medium">Cancel</button>
      <button type="button" id="confirmation-modal-confirm" class="px-4 py-2 rounded-lg bg-brand-accent text-brand-dark font-semibold text-sm hover:bg-brand-accent/90">Confirm</button>
    </div>
  </div>
</div>
