<header class="shrink-0 border-b border-brand-border bg-brand-dark/80 backdrop-blur-md z-50 p-4 px-8 flex justify-between items-center">
  <div class="flex items-center space-x-4">
    <div class="p-2 bg-brand-accent rounded-lg">
      <svg class="h-6 w-6 text-brand-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
      </svg>
    </div>
    <div>
      <h1 class="text-4xl font-bold tracking-widest text-brand-accent uppercase">ARECO 65MW SOLAR</h1>
      <p class="text-xs text-brand-muted tracking-widest uppercase"><span id="app-subtitle">WESM Nomination</span></p>
    </div>
  </div>
  {% block header_trailing %}
  <div class="flex items-center gap-6">
    <div id="navbar-current-time" class="text-2xl font-bold font-mono text-brand-accent tabular-nums" title="Current time"></div>
    <div class="flex items-baseline gap-2 border-l border-brand-border pl-6">
      <span class="text-xs text-brand-muted uppercase tracking-wider">RTD Nomination</span>
      <span id="navbar-rtd-mw" class="text-xl font-bold font-mono text-brand-accent tabular-nums">—</span>
      <span class="text-xs text-brand-muted">MW</span>
    </div>
  </div>
  {% endblock %}
</header>
