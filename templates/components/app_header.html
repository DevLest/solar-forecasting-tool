<header class="shrink-0 border-b border-brand-border bg-brand-dark/80 backdrop-blur-md z-50 p-4 px-8 flex justify-between items-center">
  <div class="flex items-center space-x-4">
    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-white p-1 shadow-sm ring-1 ring-white/15" title="Areco">
      <img
        src="{{ url_for('main.assets', filename='areco-logo.jpg') }}"
        alt="Areco"
        width="44"
        height="44"
        class="h-full w-full object-contain object-center"
        decoding="async"
        fetchpriority="high"
      />
    </div>
    <div>
      <h1 class="text-4xl font-bold tracking-widest text-brand-accent uppercase">ARECO 65MW SOLAR</h1>
      <p class="text-xs text-brand-muted tracking-widest uppercase"><span id="app-subtitle">Nomination Dashboard</span></p>
    </div>
  </div>
  {% block header_trailing %}
  <div class="flex items-center gap-3 sm:gap-6 flex-wrap justify-end">
    {% if current_user.is_authenticated %}
    <div class="flex items-center gap-2 text-right border-r border-brand-border pr-4 mr-1">
      <div class="hidden sm:block leading-tight">
        <p class="text-[11px] font-semibold text-brand-text">{{ current_user.username }}</p>
        <p class="text-[9px] uppercase tracking-wider text-brand-muted">{{ areco_role }}</p>
      </div>
      <a href="{{ url_for('main.logout') }}" class="shrink-0 rounded-lg border border-brand-border px-2.5 py-1.5 text-[10px] sm:text-xs font-semibold uppercase tracking-wide text-brand-muted hover:text-brand-accent hover:bg-brand-border/20">Log out</a>
    </div>
    {% endif %}
    {% if areco_auth.can_edit_settings %}
    <button type="button" data-open-settings class="md:hidden shrink-0 rounded-lg border border-brand-border px-2.5 py-1.5 text-[10px] sm:text-xs font-semibold uppercase tracking-wide text-brand-muted hover:text-brand-accent hover:bg-brand-border/20" title="App settings">Settings</button>
    {% endif %}
    <div id="navbar-current-time" class="text-2xl font-bold font-mono text-brand-accent tabular-nums" title="Current time"></div>
    <div class="flex items-baseline gap-2 border-l border-brand-border pl-6 flex-wrap">
      <span class="text-xs text-brand-muted uppercase tracking-wider">RTD Nomination</span>
      <span id="navbar-rtd-interval" class="text-sm font-mono font-semibold text-brand-muted tabular-nums min-w-[2.75rem] text-right" title="Interval end (nomination advance)"></span>
      <span id="navbar-rtd-mw" class="text-xl font-bold font-mono text-brand-accent tabular-nums">—</span>
      <span class="text-xs text-brand-muted">MW</span>
    </div>
  </div>
  {% endblock %}
</header>
