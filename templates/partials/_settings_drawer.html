<div id="settings-drawer-overlay" class="hidden fixed inset-0 z-[100] flex justify-end bg-black/50 backdrop-blur-[2px]" aria-hidden="true">
  <div
    id="settings-drawer-panel"
    class="w-full max-w-md h-full bg-brand-card border-l border-brand-border shadow-2xl flex flex-col overflow-hidden translate-x-full transition-transform duration-200 ease-out"
    role="dialog"
    aria-labelledby="settings-drawer-title"
    aria-modal="true"
  >
    <div class="shrink-0 flex items-center justify-between gap-3 px-5 py-4 border-b border-brand-border">
      <h2 id="settings-drawer-title" class="text-sm font-bold uppercase tracking-wider text-brand-text">App settings</h2>
      <button type="button" id="settings-drawer-close" class="rounded-lg px-3 py-1.5 text-xs font-semibold text-brand-muted hover:text-brand-text hover:bg-brand-border/30" aria-label="Close settings">Close</button>
    </div>
    <div class="flex-1 min-h-0 overflow-y-auto px-5 py-4 space-y-4 text-sm">
      <p class="text-xs text-brand-muted leading-relaxed">
        Values are saved to the project <code class="text-brand-accent/90">.env</code> file. Leave a field blank to keep its current value. Restart the app after changing the port.
      </p>
      <form id="settings-form" class="space-y-4">
        <div>
          <label for="cfg-ARECO_PORT" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">Server port</label>
          <input type="text" id="cfg-ARECO_PORT" name="ARECO_PORT" inputmode="numeric" autocomplete="off" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent" placeholder="8765" />
        </div>
        <div>
          <label for="cfg-ARECO_NOMINATION_EXPORT_DIR" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">Nomination export folder</label>
          <input type="text" id="cfg-ARECO_NOMINATION_EXPORT_DIR" name="ARECO_NOMINATION_EXPORT_DIR" autocomplete="off" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent font-mono text-xs" placeholder="automate (default under project root)" />
          <p class="text-[10px] text-brand-muted mt-1">XML and VRE CSV are written here (absolute path or folder relative to the project).</p>
        </div>
        <div>
          <label for="cfg-ARECO_SETTLEMENT_ZIP_PASSWORD1" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">Settlement zip password 1</label>
          <input type="password" id="cfg-ARECO_SETTLEMENT_ZIP_PASSWORD1" name="ARECO_SETTLEMENT_ZIP_PASSWORD1" autocomplete="new-password" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent" />
        </div>
        <div>
          <label for="cfg-ARECO_SETTLEMENT_ZIP_PASSWORD2" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">Settlement zip password 2</label>
          <input type="password" id="cfg-ARECO_SETTLEMENT_ZIP_PASSWORD2" name="ARECO_SETTLEMENT_ZIP_PASSWORD2" autocomplete="new-password" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent" />
        </div>
        <div>
          <label for="cfg-OPENAI_API_KEY" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">OpenAI API key</label>
          <input type="password" id="cfg-OPENAI_API_KEY" name="OPENAI_API_KEY" autocomplete="new-password" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent" />
        </div>
        <div>
          <label for="cfg-ACCUWEATHER_API_KEY" class="block text-[10px] uppercase tracking-wider text-brand-muted mb-1">AccuWeather API key</label>
          <input type="password" id="cfg-ACCUWEATHER_API_KEY" name="ACCUWEATHER_API_KEY" autocomplete="new-password" class="w-full bg-brand-dark border border-brand-border rounded-lg px-3 py-2 text-brand-text focus:ring-1 focus:ring-brand-accent" />
        </div>
        <div id="settings-save-status" class="text-xs min-h-[1.25rem]" role="status"></div>
        <div class="flex gap-2 pt-2">
          <button type="submit" id="settings-save-btn" class="flex-1 py-2.5 rounded-lg bg-brand-accent text-brand-dark font-bold uppercase text-xs tracking-wide hover:bg-brand-accent/90">Save to .env</button>
        </div>
      </form>
    </div>
  </div>
</div>
